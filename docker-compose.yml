version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: surveipro-app
    container_name: surveipro-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    container_name: surveipro-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-surveipro}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: surveipro-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  db-data:
